spring:
  application:
    name: Cloudstorage
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3308/my_sql_cloud_storage_db
    username: root
    password: root
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: localhost
      port: 6379
      repositories:
        enabled: true
  session:
    store-type: redis
    timeout: 30m

server:
  port: 8080


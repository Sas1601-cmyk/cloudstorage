services:
  db:
    image: mysql:latest
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: my_sql_cloud_storage_db
    ports:
      - 3308:3306
    volumes:
      - my_sql_cloud_storage_db:/var/lib/mysql
  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    restart: unless-stopped
    volumes:
      - redis-data:/data
    command: redis-server --save 60 1 --loglevel warning

volumes:
  my_sql_cloud_storage_db:
  redis-data: